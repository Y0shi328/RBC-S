<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - NENE CELLSHOP RBC'S Stock Monitoring System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="navbar">
        <div class="navbar-brand">NENE CELLSHOP - RBC'S Stock Monitoring</div>
        <div class="navbar-menu">
            <a href="{{ url_for('routes.dashboard') }}">Dashboard</a>
            <a href="{{ url_for('routes.pos') }}" class="active">POS</a>
            <span class="navbar-user">{{ current_user.username }}</span>
            <a href="{{ url_for('auth.logout') }}">Logout</a>
        </div>
    </div>
    
    <div class="pos-container">
        <div class="products-panel">
            <h2>Products</h2>
            <div class="products-search">
                <input type="text" id="searchProducts" placeholder="Search products...">
            </div>
            <div id="productsList" class="products-list"></div>
        </div>
        
        <div class="cart-panel">
            <h2>Shopping Cart</h2>
            <div id="cartItems" class="cart-items"></div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="itemsCount">0</span>
                </div>
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">₱0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">₱0.00</span>
                </div>
                <button id="checkoutBtn" class="btn btn-success btn-block" onclick="checkout()">Checkout</button>
                <button class="btn btn-secondary btn-block" onclick="clearCart()">Clear Cart</button>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/pos.js') }}"></script>
</body>
</html>
