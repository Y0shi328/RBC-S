<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBC'S Stock Monitoring System - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page-new">
    <div class="login-container-new">
        <!-- Left Side - Branding -->
        <div class="login-brand-side">
            <div class="hexagon-background"></div>
            <div class="brand-content">
                <p class="brand-label">NENE CELLSHOP</p>
                <h1 class="brand-title">RBC'S</h1>
                <p class="brand-subtitle">STOCK MONITORING SYSTEM</p>
            </div>
        </div>
        
        <!-- Right Side - Login Form -->
        <div class="login-form-side">
            <div class="login-form-container">
                <h2 class="login-title">Welcome</h2>
                
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="alert alert-{{ category }}">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form method="POST" action="{{ url_for('auth.login') }}" class="login-form-new">
                    <div class="form-group-new">
                        <label for="username">Username</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" name="username" placeholder="Enter your username" required>
                        </div>
                    </div>
                    
                    <div class="form-group-new">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="showPassword">
                            <span>Show Password</span>
                        </label>
                        <a href="{{ url_for('auth.forgot_password') }}" class="forgot-password">Forgot Password</a>
                    </div>
                    
                    <button type="submit" class="btn-login-new">Login</button>
                </form>
                
                <p class="signup-link">
                    Don't have an Account ? <a href="{{ url_for('auth.register') }}">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('showPassword').addEventListener('change', function() {
            const passwordField = document.getElementById('password');
            passwordField.type = this.checked ? 'text' : 'password';
        });
    </script>
</body>
</html>
